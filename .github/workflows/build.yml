name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Copy VC Runtime DLLs
        run: |
          $dirs = @(
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC",
            "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Redist\MSVC",
            "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Redist\MSVC"
          )
          $redistRoot = $dirs | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $redistRoot) { throw "Cannot find VC Redist path" }
          $crtDir = Get-ChildItem "$redistRoot\*\x64\Microsoft.VC143.CRT" -Directory -ErrorAction SilentlyContinue |
                    Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $crtDir) { throw "Cannot find Microsoft.VC143.CRT directory" }
          Copy-Item "$($crtDir.FullName)\*.dll" "build\windows\x64\runner\Release\"
          echo "✓ Copied VC Runtime DLLs from $($crtDir.FullName)"

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build NSIS installer
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:').Line -replace 'version: ', '' -replace '\+.*', ''
          $buildDir = "${{ github.workspace }}\build\windows\x64\runner\Release"
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DAPP_VERSION=$version /DBUILD_DIR=$buildDir "${{ github.workspace }}\windows\installer.nsi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lxzSmallTool_windows_x64
          path: build\windows\x64\runner\lxzSmallTool_setup.exe

  build-macos:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir -p /tmp/dmg_source
          cp -r "build/macos/Build/Products/Release/lxzSmallTool.app" /tmp/dmg_source/
          create-dmg \
            --volname "lxzSmallTool" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "lxzSmallTool.app" 150 185 \
            --hide-extension "lxzSmallTool.app" \
            --app-drop-link 450 185 \
            "lxzSmallTool_macos_arm64.dmg" \
            "/tmp/dmg_source/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lxzSmallTool_macos_arm64
          path: lxzSmallTool_macos_arm64.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/') && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: notes
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${CURRENT_TAG}")
          fi

          # 分类提交
          FEATS=$(echo "$COMMITS" | grep -iE "^- (feat|feature)" || true)
          FIXES=$(echo "$COMMITS" | grep -iE "^- fix" || true)
          OTHERS=$(echo "$COMMITS" | grep -viE "^- (feat|feature|fix)" || true)

          {
            echo "body<<EOF"
            echo "## 🚀 ${CURRENT_TAG} 更新内容"
            echo ""
            if [ -n "$FEATS" ]; then
              echo "### ✨ 新功能"
              echo "$FEATS"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### 🐛 修复"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$OTHERS" ]; then
              echo "### 📦 其他"
              echo "$OTHERS"
              echo ""
            fi
            echo "---"
            echo "### 📥 下载"
            echo "| 平台 | 文件 |"
            echo "|------|------|"
            echo "| Windows | \`lxzSmallTool_setup.exe\` |"
            echo "| macOS (Apple Silicon) | \`lxzSmallTool_macos_arm64.dmg\` |"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: |
            lxzSmallTool_setup.exe
            lxzSmallTool_macos_arm64.dmg
